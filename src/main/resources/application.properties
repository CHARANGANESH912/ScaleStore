# 1. SERVER CONFIGURATION
# ${PORT:8080} tells the app to use the port assigned by the host (Render/Railway)
# If no port is assigned, it defaults to 8080.
server.port=${PORT:8080}

# 2. H2 DATABASE CONFIGURATION (Persistent File Mode)
spring.h2.console.enabled=true
# Changed from 'mem' to 'file' so data is saved in a local folder named 'data'
spring.datasource.url=jdbc:h2:file:./data/scalestore
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# 3. HIBERNATE & DATA LOGIC
# 'update' is critical for production; it keeps your data safe while updating the schema
spring.jpa.hibernate.ddl-auto=update

# Ensures tables are ready before data.sql runs
spring.jpa.defer-datasource-initialization=true

# 'always' ensures your 5 starter products are loaded if the DB is empty
spring.sql.init.mode=always

# 4. DEBUGGING (Optional, keep for demo)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true