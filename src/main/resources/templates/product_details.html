<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | ScaleStore</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .product-card { background: #fff; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; margin-top: 50px; transition: transform 0.3s; }
        .product-image-container { background: #fff; padding: 20px; display: flex; align-items: center; justify-content: center; }
        .product-img { max-width: 100%; max-height: 450px; border-radius: 10px; object-fit: contain; }
        .price-tag { font-size: 2.5rem; font-weight: 800; color: #2ecc71; margin-bottom: 20px; }
        .category-badge { text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem; padding: 5px 15px; border-radius: 50px; background-color: #e8f5e9; color: #2e7d32; font-weight: bold; }
        .btn-buy { padding: 15px 30px; font-weight: bold; font-size: 1.1rem; border-radius: 10px; text-transform: uppercase; transition: all 0.3s; }
        .btn-buy:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="container pb-5">
    <div class="row product-card">
        <div class="col-md-6 product-image-container border-end">
            <img th:src="${product.imageUrl}" class="product-img" alt="Product Image" th:alt="${product.name}">
        </div>

        <div class="col-md-6 p-5 d-flex flex-column justify-content-center">
            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/" class="text-decoration-none text-muted">Store</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Product Detail</li>
                </ol>
            </nav>

            <span class="category-badge mb-2" th:text="${product.category}">Category</span>
            <h1 class="display-4 fw-bold mb-3" th:text="${product.name}">Product Name</h1>

            <hr>

            <div class="price-tag" th:text="'₹' + ${product.price}">₹0.00</div>

            <p class="text-secondary lead mb-4" th:text="${product.description}">
                This is a detailed description of the product provided by ScaleStore's dynamic backend.
            </p>

            <div class="d-grid gap-3 d-md-flex mt-auto">
                <button class="btn btn-primary btn-buy px-5">Add to Cart</button>
                <a href="/" class="btn btn-outline-secondary btn-buy">Back to Catalog</a>
            </div>

            <div class="mt-4 pt-4 border-top">
                <small class="text-muted">
                    <i class="bi bi-shield-check"></i> Secured by ScaleStore Enterprise Security
                </small>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
