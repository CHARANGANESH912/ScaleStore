<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ScaleStore Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">ScaleStore Admin</a>
        <a href="/admin/add" class="btn btn-success fw-bold">ADD NEW PRODUCT</a>
    </div>
</nav>
<div class="container">
    <div class="card shadow-sm">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <h4 class="mb-0">Inventory Overview</h4>
        </div>
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th class="ps-3">ID</th>
                    <th>Name</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th class="text-center">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="product : ${products}">
                    <td class="ps-3" th:text="${product.id}"></td>
                    <td th:text="${product.name}" class="fw-bold"></td>
                    <td th:text="'₹' + ${product.price}"></td>
                    <td th:text="${product.quantity}"></td>
                    <td class="text-center">
                        <a th:href="@{/admin/edit/{id}(id=${product.id})}" class="btn btn-sm btn-outline-primary">Edit</a>
                        <a th:href="@{/admin/delete/{id}(id=${product.id})}"
                           class="btn btn-sm btn-outline-danger"
                           onclick="return confirm('Delete this product?')">Delete</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
