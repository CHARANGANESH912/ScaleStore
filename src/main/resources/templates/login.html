<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ScaleStore | Admin Login</title>
    <style>
        body {
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            display: flex; align-items: center; justify-content: center;
            height: 100vh; margin: 0; font-family: 'Inter', sans-serif; color: white;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 32px; border: 1px solid rgba(255, 255, 255, 0.1);
            width: 350px; text-align: center;
        }
        h2 { background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        input {
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0,0,0,0.2); color: white;
        }
        button {
            width: 100%; padding: 12px; border-radius: 12px; border: none;
            background: linear-gradient(135deg, #6366f1, #a855f7); color: white; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h2>Admin Access</h2>
    <form th:action="@{/login}" method="post">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Unlock ScaleStore</button>
    </form>
</div>
</body>
</html>
