<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ScaleStore | Tech Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-card { border-radius: 15px; transition: 0.3s; border: none; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        .img-container { height: 200px; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .product-img { max-height: 100%; max-width: 100%; object-fit: contain; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark py-3 mb-5">
    <div class="container">
        <a class="navbar-brand fw-bold fs-3" href="/">ScaleStore</a>
        <a href="/admin" class="btn btn-outline-light">Admin Panel</a>
    </div>
</nav>

<div class="container">
    <h2 class="text-center fw-bold mb-5">Our Tech Collection</h2>
    <div class="row g-4">
        <div class="col-md-4 col-lg-3" th:each="product : ${products}">
            <div class="card h-100 product-card shadow-sm">
                <div class="img-container">
                    <img th:src="${product.imageUrl}" class="product-img" alt="Product">
                </div>
                <div class="card-body d-flex flex-column">
                    <small class="text-uppercase text-primary fw-bold" th:text="${product.category}"></small>
                    <h5 class="card-title fw-bold" th:text="${product.name}"></h5>
                    <p class="card-text text-muted small" th:text="${product.description}"></p>
                    <div class="d-flex justify-content-between align-items-center mt-auto">
                        <span class="fs-5 fw-bold" th:text="'₹' + ${product.price}"></span>
                        <button class="btn btn-dark btn-sm px-3 rounded-pill">Buy Now</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
